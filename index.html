<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Interactive AI Robot with Vision</title>
    <!-- TensorFlow.js and Models for browser-based vision -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        :root {
            /* Modern Blue Theme Colors */
            --bg-color: #0f172a;
            --robot-primary: #1d4ed8;
            --robot-secondary: #2563eb;
            --robot-ear: #1e3a8a;
            --robot-glow: #38bdf8;
            --screen-bg: #020617;
            --glass-bg: rgba(30, 58, 138, 0.2);
            --glass-border: rgba(56, 189, 248, 0.3);
            --hud-color: #22d3ee;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, #1e3a8a 0%, transparent 70%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: white;
        }

        .layout-container {
            display: flex;
            flex-direction: row;
            gap: 40px;
            align-items: center;
            justify-content: center;
            width: 95%;
            max-width: 1400px;
        }

        @media (max-width: 1000px) {
            .layout-container {
                flex-direction: column;
                gap: 20px;
                overflow-y: auto;
                height: 100vh;
                padding: 20px 0;
            }
        }

        /* --- Robot Structure (Blue Theme) --- */
        .robot-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            gap: 20px;
        }

        .robot-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .robot-head {
            width: 350px;
            height: 280px;
            background: linear-gradient(145deg, var(--robot-secondary), var(--robot-primary));
            border-radius: 45% 45% 40% 40% / 50% 50% 40% 40%;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), inset 0 10px 20px rgba(255,255,255,0.2);
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ear {
            width: 50px;
            height: 100px;
            background: var(--robot-ear);
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            border-radius: 20px;
            z-index: 1;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ear::after {
            content: '';
            width: 25px;
            height: 60px;
            background: var(--robot-glow);
            border-radius: 10px;
            box-shadow: 0 0 15px var(--robot-glow);
        }

        .ear.left { left: -30px; border-radius: 30px 0 0 30px; }
        .ear.right { right: -30px; border-radius: 0 30px 30px 0; }

        .screen {
            width: 80%;
            height: 70%;
            background: var(--screen-bg);
            border-radius: 35% 35% 40% 40% / 40% 40% 45% 45%;
            box-shadow: inset 0 0 30px #000, 0 5px 15px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
            border: 8px solid #111;
        }

        /* Screen Glare */
        .screen::before {
            content: '';
            position: absolute;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 50%;
            background: rgba(255, 255, 255, 0.03);
            transform: rotate(-10deg);
            border-radius: 50%;
            pointer-events: none;
        }

        /* Facial Features Container */
        .face-features {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s ease-out; /* Smooth tracking */
        }

        /* Eyes */
        .eyes-container {
            display: flex;
            gap: 60px;
            margin-bottom: 30px;
        }

        .eye {
            width: 35px;
            height: 60px;
            background: transparent;
            border: 8px solid var(--robot-glow);
            border-radius: 50px;
            box-shadow: 0 0 20px var(--robot-glow), inset 0 0 10px var(--robot-glow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Mouth */
        .mouth {
            width: 80px;
            height: 30px;
            border-bottom: 8px solid var(--robot-glow);
            border-radius: 0 0 50px 50px;
            box-shadow: 0 10px 15px -5px var(--robot-glow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- Expressions --- */
        .happy .eye { height: 40px; border-bottom-color: transparent; border-radius: 50px 50px 0 0; transform: translateY(10px); }
        .happy .mouth { width: 100px; height: 40px; border-bottom: 10px solid var(--robot-glow); }
        .sad .eye { height: 10px; background: var(--robot-glow); border-radius: 10px; }
        .sad .mouth { width: 60px; border-bottom: none; border-top: 8px solid var(--robot-glow); border-radius: 50px 50px 0 0; box-shadow: 0 -10px 15px -5px var(--robot-glow); transform: translateY(20px); }
        .angry .eye.left { transform: rotate(25deg) scaleY(0.6); background: var(--robot-glow); }
        .angry .eye.right { transform: rotate(-25deg) scaleY(0.6); background: var(--robot-glow); }
        .angry .mouth { width: 50px; border-bottom: none; border-top: 8px solid var(--robot-glow); border-radius: 10px; transform: rotate(-10deg) translateY(10px); }
        .blink .eye { transform: scaleY(0.1); border-width: 4px; }

        /* Thinking Animation */
        .thinking .eye {
            height: 15px;
            width: 40px;
            border-bottom: none;
            border-top: 8px solid var(--robot-glow);
            border-radius: 50px 50px 0 0;
            animation: thinkEye 1.5s infinite alternate ease-in-out;
        }
        @keyframes thinkEye {
            0% { transform: translateY(-15px) translateX(10px); }
            100% { transform: translateY(-15px) translateX(-10px); }
        }
        .thinking .mouth {
            width: 30px;
            height: 10px;
            border-bottom: 5px solid var(--robot-glow);
            border-radius: 10px;
            transform: translateY(10px);
        }

        .status-text {
            color: var(--robot-glow);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            height: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* --- Vision System HUD --- */
        .vision-wrapper {
            width: 350px;
            height: 200px;
            background: rgba(0,0,0,0.5);
            border: 2px solid var(--glass-border);
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .vision-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror effect */
            display: none;
        }

        .vision-wrapper canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            transform: scaleX(-1);
            pointer-events: none;
        }

        .vision-overlay-text {
            position: absolute;
            bottom: 10px; left: 10px;
            color: var(--hud-color);
            font-size: 12px;
            font-family: monospace;
            z-index: 20;
            text-shadow: 0 0 5px var(--hud-color);
        }

        .btn-vision {
            background: transparent;
            border: 1px solid var(--robot-glow);
            color: var(--robot-glow);
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .btn-vision:hover, .btn-vision.active {
            background: var(--robot-glow);
            color: #000;
            box-shadow: 0 0 15px var(--robot-glow);
        }

        /* --- Modern Chat Section --- */
        .chat-section {
            flex: 1;
            width: 100%;
            max-width: 450px;
            height: 550px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .chat-header {
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid var(--glass-border);
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .header-title { display: flex; align-items: center; gap: 10px; }

        .status-dot {
            width: 10px;
            height: 10px;
            background-color: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 10px #22c55e;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 15px;
            line-height: 1.4;
            animation: fadeIn 0.3s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
            word-wrap: break-word;
        }

        /* Embedded iframes/links */
        .message iframe {
            border-radius: 10px;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .message a {
            color: #38bdf8;
            font-weight: bold;
            text-decoration: none;
            border-bottom: 1px solid #38bdf8;
        }
        
        .message a:hover {
            color: #fff;
            border-bottom-color: #fff;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-bot {
            background: rgba(56, 189, 248, 0.15);
            border: 1px solid rgba(56, 189, 248, 0.3);
            color: #e0f2fe;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .msg-user {
            background: var(--robot-primary);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 15px 20px;
            width: fit-content;
        }
        .typing-indicator .dot {
            width: 8px;
            height: 8px;
            background: var(--robot-glow);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator .dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator .dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .chat-input-area {
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--robot-glow);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }

        .btn {
            background: var(--robot-primary);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn:hover {
            background: var(--robot-glow);
            transform: scale(1.05);
        }

        .btn-mic { background: #334155; }
        .btn-mic.listening {
            background: #ef4444;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        svg { width: 20px; height: 20px; fill: white; }

    </style>
</head>
<body>

    <div class="layout-container">
        <!-- Robot Face & Vision Section -->
        <div class="robot-section">
            <div class="robot-container">
                <div class="ear left"></div>
                <div class="robot-head">
                    <div class="screen">
                        <div class="face-features" id="face">
                            <div class="eyes-container">
                                <div class="eye left"></div>
                                <div class="eye right"></div>
                            </div>
                            <div class="mouth"></div>
                        </div>
                    </div>
                </div>
                <div class="ear right"></div>
            </div>
            
            <div class="status-text" id="status-text">
                <span id="status-msg">SYSTEM ONLINE</span>
                <button class="btn-vision" id="btn-vision" onclick="toggleVision()">Enable Vision</button>
            </div>

            <!-- Vision HUD -->
            <div class="vision-wrapper" id="vision-wrapper">
                <div id="vision-loading" style="color:var(--hud-color); font-size:12px;">CAMERA OFFLINE</div>
                <video id="webcam" autoplay playsinline muted></video>
                <canvas id="vision-canvas"></canvas>
                <div class="vision-overlay-text" id="vision-overlay-text">Awaiting Video Feed...</div>
            </div>
        </div>

        <!-- Interactive Chat Section -->
        <div class="chat-section">
            <div class="chat-header">
                <div class="header-title">
                    <div class="status-dot"></div>
                    PS HomeMate AI
                </div>
                <span style="font-size: 10px; color: var(--robot-glow); border: 1px solid var(--robot-glow); padding: 2px 6px; border-radius: 10px; letter-spacing: 1px;">PS ROBOTIX POWERED</span>
            </div>
            <div class="chat-messages" id="chat-messages">
                <div class="message msg-bot">Hi! I'm PS HomeMate. Ready to assist! Say "PS" or type below.</div>
            </div>
            <div class="chat-input-area">
                <button class="btn btn-mic" id="mic-btn" title="Voice Command">
                    <svg viewBox="0 0 384 512"><path d="M192 0C139 0 96 43 96 96V256c0 53 43 96 96 96s96-43 96-96V96c0-53-43-96-96-96zM64 216c0-13.3-10.7-24-24-24s-24 10.7-24 24v40c0 89.1 66.2 162.7 152 174.4V464H120c-13.3 0-24 10.7-24 24s10.7 24 24 24h72 72c13.3 0 24-10.7 24-24s-10.7-24-24-24H216V430.4c85.8-11.7 152-85.3 152-174.4V216c0-13.3-10.7-24-24-24s-24 10.7-24 24v40c0 70.7-57.3 128-128 128s-128-57.3-128-128V216z"/></svg>
                </button>
                <input type="text" id="chat-input" placeholder="Type a message to the AI..." autocomplete="off">
                <button class="btn btn-send" id="send-btn" title="Send Message">
                    <svg viewBox="0 0 512 512"><path d="M498.1 5.6c10.1 7 15.4 19.1 13.5 31.2l-64 416c-1.5 9.7-7.4 18.2-16 23s-18.9 5.4-28 1.6L284 427.7l-68.5 74.1c-8.9 9.7-22.9 12.9-35.2 8.1S160 493.2 160 480V396.4c0-4 1.5-7.8 4.2-10.7L331.8 202.8c5.8-6.3 5.6-16-.4-22s-15.7-6.4-22-.7L106 360.8 17.7 316.6C7.1 311.3 .3 300.7 0 288.9s5.9-22.8 16.1-28.7l448-256c10.7-6.1 23.9-5.5 34 1.4z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- Core Robot Setup ---
        const apiKey = ""; // Injected by runtime
        const face = document.getElementById('face');
        const statusMsg = document.getElementById('status-msg');
        let currentExpression = 'normal';
        let isBlinking = false;
        let visionActive = false;
        let faceTrackX = 0, faceTrackY = 0; // Coordinates from vision system

        // Mouse Tracking (Fallback when vision is off)
        document.addEventListener('mousemove', (e) => {
            if (isBlinking || visionActive) return; 
            const windowCenterX = window.innerWidth / 2;
            const windowCenterY = window.innerHeight / 2;
            const deltaX = (e.clientX - windowCenterX) / windowCenterX;
            const deltaY = (e.clientY - windowCenterY) / windowCenterY;
            const moveX = deltaX * 25; 
            const moveY = deltaY * 15; 
            face.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });

        // Loop to apply face tracking from vision system
        function updateVisionTracking() {
            if(visionActive && !isBlinking) {
                // Smoothly interpolate current transform to target tracked coordinates
                face.style.transform = `translate(${faceTrackX}px, ${faceTrackY}px)`;
            }
            requestAnimationFrame(updateVisionTracking);
        }
        updateVisionTracking();

        function setExpression(expression) {
            face.className = 'face-features ' + expression;
            currentExpression = expression;
        }

        function blink() {
            if (currentExpression !== 'normal' && currentExpression !== 'happy') {
                setTimeout(blink, Math.random() * 4000 + 2000);
                return;
            }
            isBlinking = true;
            const previousClass = face.className;
            face.className = 'face-features blink';
            setTimeout(() => {
                face.className = previousClass;
                isBlinking = false;
                setTimeout(blink, Math.random() * 4000 + 2000);
            }, 150);
        }
        setTimeout(blink, 3000);

        // --- Vision System (TensorFlow.js) ---
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('vision-canvas');
        const ctx = canvas.getContext('2d');
        const overlayText = document.getElementById('vision-overlay-text');
        const loadingText = document.getElementById('vision-loading');
        
        let objectDetector, faceDetector;

        async function toggleVision() {
            const btn = document.getElementById('btn-vision');
            if (visionActive) {
                // Turn off
                visionActive = false;
                btn.classList.remove('active');
                btn.innerText = "Enable Vision";
                video.style.display = 'none';
                loadingText.style.display = 'block';
                loadingText.innerText = "CAMERA OFFLINE";
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                overlayText.innerText = "Awaiting Video Feed...";
                const stream = video.srcObject;
                if(stream) stream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
            } else {
                // Turn on
                visionActive = true;
                btn.classList.add('active');
                btn.innerText = "Disable Vision";
                loadingText.innerText = "LOADING AI MODELS...";
                
                try {
                    // Load Models only if not loaded
                    if(!objectDetector) {
                        objectDetector = await cocoSsd.load();
                        faceDetector = await blazeface.load();
                    }

                    loadingText.innerText = "STARTING CAMERA...";
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                    video.srcObject = stream;
                    
                    video.onloadedmetadata = () => {
                        video.style.display = 'block';
                        loadingText.style.display = 'none';
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        detectFrame();
                    };
                } catch (err) {
                    console.error("Vision Error:", err);
                    loadingText.innerText = "CAMERA ACCESS DENIED";
                    visionActive = false;
                    btn.classList.remove('active');
                    btn.innerText = "Enable Vision";
                }
            }
        }

        async function detectFrame() {
            if (!visionActive || video.paused || video.ended) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let detectionsText = "Detected: ";
            let foundFace = false;

            // 1. Object Detection
            const objects = await objectDetector.detect(video);
            objects.forEach(obj => {
                ctx.beginPath();
                ctx.rect(...obj.bbox);
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#22d3ee';
                ctx.stroke();
                ctx.fillStyle = '#22d3ee';
                ctx.fillText(`${obj.class} (${Math.round(obj.score * 100)}%)`, obj.bbox[0], obj.bbox[1] > 10 ? obj.bbox[1] - 5 : 10);
                if(obj.class !== 'person') detectionsText += obj.class + ", ";
            });

            // 2. Face Detection
            const faces = await faceDetector.estimateFaces(video, false);
            if (faces.length > 0) {
                foundFace = true;
                detectionsText += "Face";
                
                // Track the first detected face with robot eyes
                const faceData = faces[0];
                const cx = (faceData.topLeft[0] + faceData.bottomRight[0]) / 2;
                const cy = (faceData.topLeft[1] + faceData.bottomRight[1]) / 2;
                
                // Calculate position relative to center of video feed
                // Note: Video is mirrored, so we invert X calculation visually
                const deltaX = (cx - (canvas.width / 2)) / (canvas.width / 2);
                const deltaY = (cy - (canvas.height / 2)) / (canvas.height / 2);
                
                // Update tracking variables used by the animation loop
                // X is inverted because the video feed is mirrored
                faceTrackX = -(deltaX * 30); 
                faceTrackY = deltaY * 20;

                faces.forEach(face => {
                    const start = face.topLeft;
                    const end = face.bottomRight;
                    const size = [end[0] - start[0], end[1] - start[1]];
                    ctx.beginPath();
                    ctx.rect(start[0], start[1], size[0], size[1]);
                    ctx.lineWidth = 3;
                    ctx.strokeStyle = '#38bdf8'; // brighter blue for faces
                    ctx.stroke();
                });
            } else {
                // Slowly return eyes to center if no face found
                faceTrackX *= 0.9;
                faceTrackY *= 0.9;
            }

            if (detectionsText === "Detected: ") detectionsText = "Monitoring Area...";
            overlayText.innerText = detectionsText.replace(/, $/, "");

            requestAnimationFrame(detectFrame);
        }

        // --- AI API Logic (Gemini integration) ---
        async function fetchGeminiResponse(prompt, retries = 5) {
            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            // Provide context to the AI
            let visionContext = "";
            if(visionActive) {
                visionContext = `The robot's camera is ON. The system is currently seeing: ${overlayText.innerText}. `;
            }

            // System instructions updated to constrain character limit and provide web embedding functionality
            const systemInstruction = `You are PS HomeMate, an advanced, friendly AI robot interface. Keep your answers extremely concise, definite, and strictly under 500 characters. Give brief, direct answers. ${visionContext} 
            
            WEB AND YOUTUBE INTEGRATION:
            If the user asks to open a website, provide a clickable HTML link using this format: <br><a href="https://www.example.com" target="_blank">Click here to open [Website Name]</a>
            If the user asks to play a YouTube video or search YouTube, DO NOT use an iframe as YouTube blocks it (Error 153). Instead, provide a direct clickable link using this format: <br><a href="https://www.youtube.com/results?search_query=QUERY" target="_blank">Click here to watch [QUERY] on YouTube</a>.
            
            IMPORTANT: At the very end of your response, you MUST include exactly one of these emotion tags representing your mood: [HAPPY], [SAD], [ANGRY], or [NORMAL].`;

            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] }
            };

            const delays = [1000, 2000, 4000, 8000, 16000];

            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const errorText = await response.text();
                        console.error(`API Error (${response.status}):`, errorText);
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    
                    const data = await response.json();
                    
                    // Check if generation was blocked by safety settings
                    if (data.candidates && data.candidates[0].finishReason !== 'STOP') {
                        console.warn("Generation stopped early. Reason:", data.candidates[0].finishReason);
                        if (data.candidates[0].finishReason === 'SAFETY') {
                            return "I cannot respond to that query due to safety guidelines. [NORMAL]";
                        }
                    }

                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if(!text) {
                        console.error("Unexpected API response structure:", data);
                        throw new Error("Empty response from AI.");
                    }
                    
                    return text;

                } catch (error) {
                    if (i === retries - 1) {
                        console.error("Gemini API failed after retries:", error);
                        return "Connection error to the PS Robotix matrix. Please check the browser console (F12) for details or try again later. [SAD]";
                    }
                    console.warn(`Retrying API call... Attempt ${i + 2}`);
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        }

        // Helper function to strip HTML for voice synthesis so it doesn't say out loud "iframe source equals..."
        function stripHTML(html) {
           let doc = new DOMParser().parseFromString(html, 'text/html');
           return doc.body.textContent || "";
        }

        // --- Chat & UI Logic ---
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const micBtn = document.getElementById('mic-btn');

        // Web Speech API for Recognition
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => {
                micBtn.classList.add('listening');
                chatInput.placeholder = "Listening...";
                statusMsg.innerText = "LISTENING...";
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                chatInput.value = transcript;
                handleUserMessage();
            };

            recognition.onerror = (event) => {
                console.error("Speech error", event.error);
                micBtn.classList.remove('listening');
                chatInput.placeholder = "Type a message to the AI...";
                statusMsg.innerText = "SYSTEM ONLINE";
            };

            recognition.onend = () => {
                micBtn.classList.remove('listening');
                chatInput.placeholder = "Type a message to the AI...";
            };
        } else {
            micBtn.style.display = 'none'; 
        }

        micBtn.addEventListener('click', () => {
            if (recognition) {
                if (micBtn.classList.contains('listening')) recognition.stop();
                else recognition.start();
            }
        });

        // Web Speech API for Synthesis
        function speakBotResponse(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const utterance = new SpeechSynthesisUtterance(text);
                const voices = window.speechSynthesis.getVoices();
                const preferredVoice = voices.find(v => v.lang.includes('en') && (v.name.includes('Google') || v.name.includes('Samantha')));
                if(preferredVoice) utterance.voice = preferredVoice;
                utterance.pitch = 1.1; 
                utterance.rate = 1.05;
                window.speechSynthesis.speak(utterance);
            }
        }

        function appendMessage(sender, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender === 'user' ? 'msg-user' : 'msg-bot'}`;
            
            // Allow bot messages to render HTML (like iframes and links) safely
            if(sender === 'bot') {
                msgDiv.innerHTML = text;
            } else {
                msgDiv.innerText = text;
            }

            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight; 
        }

        async function handleUserMessage() {
            let text = chatInput.value.trim();
            if (!text) return;

            // Check for Wake word
            const lowerText = text.toLowerCase();
            if (lowerText.startsWith('ps ') || lowerText === 'ps') {
                text = text.replace(/^ps\s*/i, '');
                if(text === '') text = "Are you there?"; 
            }

            // 1. Show user message
            appendMessage('user', text);
            chatInput.value = '';

            // 2. Set Thinking State UI
            statusMsg.innerText = "THINKING...";
            setExpression('thinking');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message msg-bot typing-indicator';
            typingDiv.id = 'typing-indicator';
            typingDiv.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            chatMessages.appendChild(typingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            // 3. Ask Gemini AI
            let rawResponse = await fetchGeminiResponse(text);
            
            // 4. Parse Emotion from the response text
            let finalEmotion = 'normal';
            const emotionMatch = rawResponse.match(/\[(HAPPY|SAD|ANGRY|NORMAL)\]/i);
            
            if (emotionMatch) {
                finalEmotion = emotionMatch[1].toLowerCase();
                // Remove the tag from the spoken/displayed text
                rawResponse = rawResponse.replace(/\[(HAPPY|SAD|ANGRY|NORMAL)\]/gi, '').trim();
            }

            // 5. Update UI
            const indicator = document.getElementById('typing-indicator');
            if(indicator) indicator.remove();

            appendMessage('bot', rawResponse);
            setExpression(finalEmotion);
            
            // Strip HTML elements so the voice doesn't spell out "iframe source equals..."
            speakBotResponse(stripHTML(rawResponse));
            
            statusMsg.innerText = "SYSTEM ONLINE";
        }

        sendBtn.addEventListener('click', handleUserMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleUserMessage();
        });

    </script>
</body>
</html>
